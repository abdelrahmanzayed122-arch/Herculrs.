<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love You Nono ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ffdce8;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.container{
z-index:2;
}

h1{
font-size:55px;
color:#ff2f75;
margin-bottom:20px;
animation:pulse 1s infinite;
}

h2{
font-size:38px;
color:#ff5a92;
margin-bottom:25px;
}

img{
width:350px;
border-radius:20px;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.heart{
position:absolute;
color:red;
animation:float 6s linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-100px);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>I KNEW YOU WOULD SAY YES ❤️</h1>

<h2>LOVE YOU NONO 🥰💖</h2>

<img src="hug.gif" alt="love">

</div>

<script>

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*30+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,200);

</script>

</body>
</html>
